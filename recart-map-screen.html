<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .screen {
    width: 100vw; height: 100vh;
    background: #060d1e; font-family: 'Inter', sans-serif;
    display: grid; grid-template-columns: 28% 1fr;
    position: relative; overflow: hidden;
  }
  .left {
    position: relative; z-index: 3;
    display: flex; flex-direction: column;
    padding: 4% 4%;
    border-right: 1px solid rgba(255,255,255,0.06);

    line-height: 0.9; text-transform: uppercase; letter-spacing: -0.03em;
    margin-bottom: clamp(12px,1.8vh,22px);
  }
  .brand-list { flex: 1; display: flex; flex-direction: column; gap: 0; overflow: hidden; }
  .brand-item {
    display: flex; align-items: center; gap: 10px;
    padding: clamp(4px,0.6vh,8px) 10px;
    border-radius: 4px; transition: all 0.4s ease;
  }
  .brand-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; transition: transform 0.3s; }
  .brand-name-lbl {
    font-size: clamp(11px,1.1vw,16px); font-weight: 600;
    color: rgba(255,255,255,0.38); text-transform: uppercase;
    letter-spacing: 0.03em; transition: color 0.3s; flex: 1;
  }
  .brand-city-lbl {
    font-size: clamp(9px,0.88vw,13px); color: rgba(255,255,255,0.2);
    transition: color 0.3s; white-space: nowrap;
  }
  .brand-item.active { background: rgba(3,117,255,0.1); }
  .brand-item.active .brand-name-lbl { color: #fff; }
  .brand-item.active .brand-dot { transform: scale(1.4); }
  .brand-item.active .brand-city-lbl { color: #0375FF; }
  .clock {
    font-size: clamp(14px,1.6vw,22px); color: rgba(255,255,255,0.72);
    letter-spacing: 0.06em; margin-top: auto; padding-top: 6px;
  }
  .map-area { position: relative; z-index: 1; overflow: hidden; }

<script>
const BRANDS = [
  { name: 'Carnivore Snax',        city: 'Lewis Center, OH',      x: 646, y: 236, color: '#EF4444' },
  { name: 'Burlebo',               city: 'Austin, TX',            x: 388, y: 420, color: '#F59E0B' },
  { name: 'Made by Mary',          city: 'Bluffdale, UT',         x: 276, y: 278, color: '#F472B6' },
  { name: 'The Wellness Company',  city: 'Boca Raton, FL',        x: 688, y: 448, color: '#00B4D8' },
  { name: 'Simple Modern',         city: 'Moore, OK',             x: 432, y: 330, color: '#60A5FA' },
  { name: 'Bambu Earth',           city: 'Havelock, NC',          x: 730, y: 298, color: '#6EE7B7' },
  { name: 'Canvas Beauty',         city: 'Huntsville, AL',        x: 550, y: 340, color: '#EC4899' },
  { name: 'Goose Creek',           city: 'Liberty, KY',           x: 606, y: 274, color: '#0375FF' },
  { name: 'Comfrt',                city: 'Miami, FL',             x: 650, y: 466, color: '#C084FC' },
  { name: 'The Mane Attraction',   city: 'Madison, MS',           x: 510, y: 370, color: '#8B5CF6' },
  { name: 'Rejuveen',              city: 'San Francisco, CA',     x: 74,  y: 248, color: '#FDE68A' },
  { name: 'Scentiment',            city: 'Houston, TX',           x: 420, y: 440, color: '#10B981' },
  { name: 'Her Fantasy Box',       city: 'Tampa, FL',             x: 626, y: 426, color: '#A855F7' },
  { name: 'Judith March',          city: 'Santa Rosa Beach, FL',  x: 550, y: 406, color: '#34D399' },
  { name: 'BetterBody',            city: 'Lindon, UT',            x: 286, y: 260, color: '#93C5FD' },
];

const FIPS = {
  '01':'AL','04':'AZ','05':'AR','06':'CA','08':'CO','09':'CT','10':'DE',
  '12':'FL','13':'GA','16':'ID','17':'IL','18':'IN','19':'IA','20':'KS',
  '21':'KY','22':'LA','23':'ME','24':'MD','25':'MA','26':'MI','27':'MN',
  '28':'MS','29':'MO','30':'MT','31':'NE','32':'NV','33':'NH','34':'NJ',
  '35':'NM','36':'NY','37':'NC','38':'ND','39':'OH','40':'OK','41':'OR',
  '42':'PA','44':'RI','45':'SC','46':'SD','47':'TN','48':'TX','49':'UT',
  '50':'VT','51':'VA','53':'WA','54':'WV','55':'WI','56':'WY'
};

const LATLON = {
  'Carnivore Snax':       [-82.99, 40.18],
  'Burlebo':              [-97.74, 30.27],
  'Made by Mary':         [-111.94, 40.49],
  'The Wellness Company': [-80.08, 26.35],
  'Simple Modern':        [-97.49, 35.34],
  'Bambu Earth':          [-76.90, 34.88],
  'Canvas Beauty':        [-86.59, 34.73],
  'Goose Creek':          [-84.94, 37.32],
  'Comfrt':               [-80.19, 25.77],
  'The Mane Attraction':  [-90.11, 32.46],
  'Rejuveen':             [-122.42, 37.77],
  'Scentiment':           [-95.37, 29.76],
  'Her Fantasy Box':      [-82.46, 27.95],
  'Judith March':         [-86.24, 30.39],
  'BetterBody':           [-111.72, 40.34],
};

let activeIdx = 0;

function renderAll() {
  document.getElementById('brand-list').innerHTML = BRANDS.map((br, i) => `
    <div class="brand-item${i === activeIdx ? ' active' : ''}">
      <div class="brand-dot" style="background:${br.color}"></div>
      <div class="brand-name-lbl">${br.name}</div>
      <div class="brand-city-lbl">${br.city}</div>
    </div>
  `).join('');

  const g = document.getElementById('pins');
  g.innerHTML = '';
  BRANDS.forEach((br, i) => {
    const isActive = i === activeIdx;
    const grp = document.createElementNS('http://www.w3.org/2000/svg','g');
    if (isActive) {
      const r = document.createElementNS('http://www.w3.org/2000/svg','circle');
      r.setAttribute('cx',br.x); r.setAttribute('cy',br.y); r.setAttribute('r','6');
      r.setAttribute('fill','none'); r.setAttribute('stroke',br.color); r.setAttribute('stroke-width','1.5');
      r.innerHTML = `<animate attributeName="r" from="7" to="22" dur="1.8s" repeatCount="indefinite"/>
                     <animate attributeName="opacity" from="0.7" to="0" dur="1.8s" repeatCount="indefinite"/>`;
      grp.appendChild(r);
    }
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',br.x); c.setAttribute('cy',br.y);
    c.setAttribute('r', isActive ? '8' : '5');
    c.setAttribute('fill', br.color);
    c.setAttribute('opacity', isActive ? '1' : '0.6');
    grp.appendChild(c);
    const ci = document.createElementNS('http://www.w3.org/2000/svg','circle');
    ci.setAttribute('cx',br.x); ci.setAttribute('cy',br.y);
    ci.setAttribute('r', isActive ? '3' : '2');
    ci.setAttribute('fill','#fff');
    grp.appendChild(ci);
    if (isActive) {
      const nameW = br.name.length * 7 + 20;
      const cityW = br.city.length * 6 + 16;
      const pillW = Math.max(nameW, cityW);
      const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
      rect.setAttribute('x', br.x - pillW/2); rect.setAttribute('y', br.y - 52);
      rect.setAttribute('width', pillW); rect.setAttribute('height', 36);
      rect.setAttribute('rx','5'); rect.setAttribute('fill', br.color); rect.setAttribute('opacity','0.95');
      grp.appendChild(rect);
      const tn = document.createElementNS('http://www.w3.org/2000/svg','text');
      tn.setAttribute('x',br.x); tn.setAttribute('y',br.y-34);
      tn.setAttribute('text-anchor','middle'); tn.setAttribute('fill','#fff');
      tn.setAttribute('font-size','11'); tn.setAttribute('font-weight','900');
      tn.setAttribute('font-family','Inter,sans-serif');
      tn.textContent = br.name;
      grp.appendChild(tn);
      const tc = document.createElementNS('http://www.w3.org/2000/svg','text');
      tc.setAttribute('x',br.x); tc.setAttribute('y',br.y-20);
      tc.setAttribute('text-anchor','middle'); tc.setAttribute('fill','rgba(255,255,255,0.85)');
      tc.setAttribute('font-size','9'); tc.setAttribute('font-weight','600');
      tc.setAttribute('font-family','Inter,sans-serif');
      tc.textContent = br.city;
      grp.appendChild(tc);
    }
    g.appendChild(grp);
  });
}

function tick() {
  const now = new Date(); const el = document.getElementById('clock-el');
  if (el) el.textContent = now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) + ' · ' + now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

const proj = d3.geoAlbers()
  .center([-0.6, 38.7])
  .rotate([96, 0])
  .parallels([29.5, 45.5])
  .scale(1070)
  .translate([480, 250]);
const pathGen = d3.geoPath().projection(proj);

BRANDS.forEach(br => {
  const ll = LATLON[br.name];
  if (ll) { const pt = proj(ll); if (pt) { br.x = Math.round(pt[0]); br.y = Math.round(pt[1]); } }
});

tick();

fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json')
  .then(r => r.json())
  .then(us => {
    const SKIP = new Set(['02','15']);
    const features = topojson.feature(us, us.objects.states).features
      .filter(f => !SKIP.has(f.id.toString().padStart(2,'0')));

    const statesG = document.getElementById('states');
    features.forEach(f => {
      const p = document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d', pathGen(f));
      statesG.appendChild(p);
    });

    const labelsG = document.getElementById('state-labels');
    features.forEach(f => {
      const abbr = FIPS[f.id.toString().padStart(2,'0')];
      if (!abbr) return;
      const c = pathGen.centroid(f);
      if (!c || isNaN(c[0])) return;
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x', c[0]); t.setAttribute('y', c[1] + 4);
      t.textContent = abbr;
      labelsG.appendChild(t);
    });

    renderAll();
    setInterval(() => { activeIdx = (activeIdx+1)%BRANDS.length; renderAll(); }, 3000);
  });

setInterval(tick, 30000);
setTimeout(() => location.reload(), 60 * 60 * 1000);
</script>
</body>
</html>
